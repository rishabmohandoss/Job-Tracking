<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: #0a0a0a;
            color: #f5f5f7;
            height: 100vh;
            overflow: hidden;
        }

        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        }

        .login-container {
            width: 100%;
            max-width: 320px;
            padding: 40px 20px;
        }

        .login-container h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .login-container p {
            color: #86868b;
            font-size: 15px;
            margin-bottom: 32px;
        }

        .login-container input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #424245;
            border-radius: 8px;
            background: #1a1a1a;
            color: #f5f5f7;
            font-size: 15px;
            margin-bottom: 16px;
            transition: all 0.3s;
        }

        .login-container input:focus {
            outline: none;
            border-color: #0071e3;
            background: #262626;
        }

        .login-container button {
            width: 100%;
            padding: 12px;
            background: #0071e3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .login-container button:hover {
            background: #0077ed;
        }

        .login-container button:active {
            opacity: 0.8;
        }

        .main-app {
            display: flex;
            height: 100vh;
            gap: 0;
        }

        .sidebar {
            width: 320px;
            background: #1a1a1a;
            border-right: 1px solid #424245;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #424245;
        }

        .sidebar-header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .sidebar-header p {
            color: #86868b;
            font-size: 13px;
        }

        .sidebar-actions {
            padding: 12px;
            border-bottom: 1px solid #424245;
            display: flex;
            gap: 8px;
        }

        .sidebar-actions button {
            flex: 1;
            padding: 8px 12px;
            background: #424245;
            color: #f5f5f7;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sidebar-actions button:hover {
            background: #515154;
        }

        .companies-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .company-item {
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 8px;
            border: 1px solid transparent;
            transition: all 0.2s;
            background: #262626;
        }

        .company-item:hover {
            background: #323235;
        }

        .company-item.active {
            background: #0071e3;
            border-color: #0071e3;
        }

        .company-item-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .company-item-status {
            font-size: 12px;
            color: #86868b;
        }

        .company-item.active .company-item-status {
            color: #d0d0d7;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .list-view, .detail-view {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }

        .list-view.active, .detail-view.active {
            display: flex;
        }

        .view-header {
            padding: 24px;
            border-bottom: 1px solid #424245;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .view-header h2 {
            font-size: 20px;
            font-weight: 600;
        }

        .add-company-form {
            display: flex;
            gap: 8px;
        }

        .add-company-form input {
            flex: 1;
            padding: 8px 12px;
            background: #262626;
            border: 1px solid #424245;
            border-radius: 6px;
            color: #f5f5f7;
            font-size: 13px;
        }

        .add-company-form button {
            padding: 8px 16px;
            background: #0071e3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .add-company-form button:hover {
            background: #0077ed;
        }

        .companies-grid {
            flex: 1;
            overflow-y: auto;
            padding: 12px 24px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 12px;
            align-content: start;
        }

        .company-card {
            background: #262626;
            border: 1px solid #424245;
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .company-card:hover {
            border-color: #0071e3;
            background: #2a2a2d;
        }

        .company-card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .company-card-name {
            font-size: 16px;
            font-weight: 600;
            word-break: break-word;
        }

        .company-card-menu {
            background: none;
            border: none;
            color: #86868b;
            cursor: pointer;
            font-size: 18px;
            padding: 0;
        }

        .company-card-link {
            color: #0071e3;
            font-size: 13px;
            word-break: break-all;
            margin-bottom: 12px;
            text-decoration: none;
        }

        .company-card-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #0071e3;
        }

        .positions-dropdown {
            flex: 1;
            padding: 6px 10px;
            background: #323235;
            border: 1px solid #424245;
            border-radius: 6px;
            color: #f5f5f7;
            font-size: 12px;
            cursor: pointer;
        }

        .add-position-input {
            width: 100%;
            padding: 8px 10px;
            background: #323235;
            border: 1px solid #424245;
            border-radius: 6px;
            color: #f5f5f7;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .detail-view-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .detail-info {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .detail-header {
            margin-bottom: 32px;
        }

        .detail-header h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .detail-link {
            color: #0071e3;
            font-size: 14px;
            text-decoration: none;
            word-break: break-all;
        }

        .detail-section {
            margin-bottom: 32px;
        }

        .detail-section h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #f5f5f7;
        }

        .detail-section textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            background: #262626;
            border: 1px solid #424245;
            border-radius: 8px;
            color: #f5f5f7;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
        }

        .detail-section textarea:focus {
            outline: none;
            border-color: #0071e3;
        }

        .file-upload-area {
            border: 2px dashed #424245;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #262626;
        }

        .file-upload-area:hover {
            border-color: #0071e3;
            background: #2a2a2d;
        }

        .file-upload-input {
            display: none;
        }

        .files-list {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: #262626;
            border-radius: 6px;
            font-size: 13px;
        }

        .file-item button {
            background: none;
            border: none;
            color: #ff3b30;
            cursor: pointer;
            font-size: 14px;
        }

        .back-button {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #262626;
            border: 1px solid #424245;
            border-radius: 6px;
            color: #f5f5f7;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .back-button:hover {
            background: #323235;
        }

        .buttons-row {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .buttons-row button {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #0071e3;
            color: white;
        }

        .btn-primary:hover {
            background: #0077ed;
        }

        .btn-danger {
            background: #ff3b30;
            color: white;
        }

        .btn-danger:hover {
            background: #ff453a;
        }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid #424245;
            display: flex;
            gap: 8px;
        }

        .sidebar-footer button {
            flex: 1;
            padding: 8px 12px;
            background: #262626;
            color: #f5f5f7;
            border: 1px solid #424245;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sidebar-footer button:hover {
            background: #323235;
        }

        .logout-btn {
            background: #ff3b30 !important;
            color: white !important;
        }

        .logout-btn:hover {
            background: #ff453a !important;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #424245;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #515154;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-container">
            <h1>Career Tracker</h1>
            <p>Enter your password to continue</p>
            <input
                type="password"
                id="passwordInput"
                placeholder="Password"
                onkeypress="if(event.key === 'Enter') login()"
            >
            <button onclick="login()">Unlock</button>
        </div>
    </div>

    <!-- Main App -->
    <div class="main-app" id="mainApp" style="display: none;">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>Companies</h1>
                <p id="companyCount">0 companies</p>
            </div>

            <div class="sidebar-actions">
                <button onclick="switchView('list')">List View</button>
                <button onclick="switchView('grid')">Grid View</button>
            </div>

            <div class="companies-list" id="companiesList"></div>

            <div class="sidebar-footer">
                <button onclick="exportData()">Export</button>
                <button onclick="importData()">Import</button>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- Content Area -->
        <div class="content">
            <!-- List View -->
            <div class="list-view active" id="listView">
                <div class="view-header">
                    <h2>Add Company</h2>
                </div>
                <div style="flex: 1; overflow-y: auto; padding: 24px;">
                    <div class="add-company-form">
                        <input type="text" id="companyNameInput" placeholder="Company Name">
                        <input type="url" id="companyUrlInput" placeholder="Career Page URL">
                        <button onclick="addCompany()">Add</button>
                    </div>
                    <div id="companiesTable" style="margin-top: 32px;"></div>
                </div>
            </div>

            <!-- Grid View -->
            <div id="gridView" style="display: none; flex: 1; flex-direction: column;">
                <div class="view-header">
                    <h2>Companies</h2>
                </div>
                <div class="companies-grid" id="companiesGrid"></div>
            </div>

            <!-- Detail View -->
            <div class="detail-view" id="detailView">
                <div style="flex: 1; overflow-y: auto;">
                    <div class="detail-info">
                        <button class="back-button" onclick="showCompanyList()">← Back</button>
                        <div class="detail-header">
                            <h2 id="detailCompanyName"></h2>
                            <a id="detailCompanyLink" class="detail-link" target="_blank"></a>
                        </div>

                        <div class="detail-section">
                            <h3>What They're Looking For</h3>
                            <textarea id="lookingFor" placeholder="e.g., Skills, experience level, specific requirements..."></textarea>
                        </div>

                        <div class="detail-section">
                            <h3>Recruiter Information</h3>
                            <textarea id="recruiterInfo" placeholder="Name, email, phone number, LinkedIn profile..."></textarea>
                        </div>

                        <div class="detail-section">
                            <h3>People at Company</h3>
                            <textarea id="peopleInfo" placeholder="Names, departments, connections..."></textarea>
                        </div>

                        <div class="detail-section">
                            <h3>Personal Notes</h3>
                            <textarea id="personalNotes" placeholder="Any other notes or observations..."></textarea>
                        </div>

                        <div class="detail-section">
                            <h3>Files</h3>
                            <div class="file-upload-area" onclick="document.getElementById('fileInput').click()">
                                <p>Click to upload files (Resume, Cover Letter, etc.)</p>
                            </div>
                            <input type="file" id="fileInput" class="file-upload-input" onchange="addFile()">
                            <div class="files-list" id="filesList"></div>
                        </div>

                        <div class="buttons-row">
                            <button class="btn-primary" onclick="saveCompanyDetails()">Save</button>
                            <button class="btn-danger" onclick="deleteCompany()">Delete Company</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PASSWORD = "09132006";
        let companies = [];
        let currentCompanyId = null;
        let currentViewMode = 'list';

        // Pre-loaded Fortune 1000 companies data
        const fortuneCompaniesData = [{"name": "Amazon", "url": "https://www.amazon.jobs/en/"}, {"name": "Walmart", "url": "https://careers.walmart.com/"}, {"name": "UnitedHealth Group", "url": "https://careers.unitedhealthgroup.com/"}, {"name": "Apple", "url": "https://www.apple.com/careers/"}, {"name": "McKesson", "url": "https://careers.mckesson.com/"}, {"name": "Alphabet", "url": "https://careers.google.com/"}, {"name": "CVS Health", "url": "https://jobs.cvshealth.com/"}, {"name": "Berkshire Hathaway", "url": "https://www.berkshirehathaway.com/careers.html"}, {"name": "Exxon Mobil", "url": "https://www.exxonmobil.com/en/career/"}, {"name": "Cencora", "url": "https://www.cencora.com/careers/"}, {"name": "Microsoft", "url": "https://careers.microsoft.com/"}, {"name": "Costco", "url": "https://www.costco.com/careers"}, {"name": "Cigna", "url": "https://careers.cigna.com/"}, {"name": "Cardinal Health", "url": "https://www.cardinalhealth.com/en/careers.html"}, {"name": "Nvidia", "url": "https://www.nvidia.com/en-us/about-nvidia/careers/"}, {"name": "Meta", "url": "https://www.metacareers.com/"}, {"name": "Elevance Health", "url": "https://careers.elevancehealth.com/"}, {"name": "Centene", "url": "https://careers.centene.com/"}, {"name": "Chevron", "url": "https://jobs.chevron.com/"}, {"name": "Ford Motor", "url": "https://www.ford.com/careers/"}, {"name": "General Motors", "url": "https://www.gm.com/careers"}, {"name": "JPMorgan Chase", "url": "https://www.jpmorganchase.com/careers"}, {"name": "Home Depot", "url": "https://careers.homedepot.com/"}, {"name": "Fannie Mae", "url": "https://careers.fanniemae.com/"}, {"name": "Walgreens", "url": "https://www.walgreens.com/careers"}, {"name": "Kroger", "url": "https://www.kroger.com/careers"}, {"name": "Verizon", "url": "https://www.verizon.com/careers/"}, {"name": "Marathon Petroleum", "url": "https://careers.marathonpetroleum.com/"}, {"name": "StoneX", "url": "https://careers.stonex.com/"}, {"name": "Phillips 66", "url": "https://careers.phillips66.com/"}, {"name": "Humana", "url": "https://careers.humana.com/"}, {"name": "AT&T", "url": "https://www.att.com/careers/"}, {"name": "Comcast", "url": "https://jobs.comcast.com/"}, {"name": "State Farm", "url": "https://careers.statefarm.com/"}, {"name": "Valero Energy", "url": "https://careers.valero.com/"}, {"name": "Freddie Mac", "url": "https://careers.freddiemac.com/"}, {"name": "Dell Technologies", "url": "https://www.dell.com/en-us/careers"}, {"name": "Bank of America", "url": "https://careers.bofa.com/"}, {"name": "Bank of New York Mellon", "url": "https://www.bnymellon.com/en/us/careers/"}, {"name": "Target", "url": "https://www.target.com/careers"}, {"name": "Tesla", "url": "https://www.tesla.com/careers"}, {"name": "Walt Disney", "url": "https://jobs.disneycareers.com/"}, {"name": "Johnson & Johnson", "url": "https://www.jnj.com/careers"}, {"name": "PepsiCo", "url": "https://www.pepsico.com/careers"}, {"name": "Boeing", "url": "https://www.boeing.com/careers/"}, {"name": "UPS", "url": "https://www.ups.com/upscareers"}, {"name": "RTX", "url": "https://www.rtx.com/careers"}, {"name": "FedEx", "url": "https://careers.fedex.com/"}, {"name": "Progressive", "url": "https://jobs.progressive.com/"}, {"name": "Lowe's", "url": "https://careers.lowes.com/"}];

        // Initialize
        function init() {
            loadFromStorage();
            // If first time (no data), load fortune companies
            if (companies.length === 0) {
                companies = fortuneCompaniesData.map(comp => ({
                    id: Date.now().toString() + Math.random(),
                    name: comp.name,
                    url: comp.url,
                    applied: false,
                    positions: [],
                    notes: {
                        lookingFor: '',
                        recruiterInfo: '',
                        peopleInfo: '',
                        personalNotes: '',
                        files: []
                    }
                }));
                saveToStorage();
            }
            const isLoggedIn = sessionStorage.getItem('loggedIn');
            if (isLoggedIn) {
                showApp();
            }
        }

        // Authentication
        function login() {
            const password = document.getElementById('passwordInput').value;
            if (password === PASSWORD) {
                sessionStorage.setItem('loggedIn', 'true');
                showApp();
            } else {
                alert('Incorrect password');
                document.getElementById('passwordInput').value = '';
            }
        }

        function logout() {
            sessionStorage.removeItem('loggedIn');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('passwordInput').value = '';
        }

        function showApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            renderCompanies();
        }

        // Storage
        function loadFromStorage() {
            const stored = localStorage.getItem('careerTrackerData');
            if (stored) {
                companies = JSON.parse(stored);
            }
        }

        function saveToStorage() {
            localStorage.setItem('careerTrackerData', JSON.stringify(companies));
        }

        function exportData() {
            const dataStr = JSON.stringify(companies, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `career-tracker-backup-${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            URL.revokeObjectURL(url);
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        companies = JSON.parse(event.target.result);
                        saveToStorage();
                        renderCompanies();
                        alert('Data imported successfully!');
                    } catch (err) {
                        alert('Error importing file: ' + err.message);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // Company Management
        function addCompany() {
            const name = document.getElementById('companyNameInput').value.trim();
            const url = document.getElementById('companyUrlInput').value.trim();

            if (!name) {
                alert('Please enter a company name');
                return;
            }

            const company = {
                id: Date.now().toString(),
                name: name,
                url: url || '',
                applied: false,
                positions: [],
                notes: {
                    lookingFor: '',
                    recruiterInfo: '',
                    peopleInfo: '',
                    personalNotes: '',
                    files: []
                }
            };

            companies.push(company);
            saveToStorage();
            renderCompanies();
            document.getElementById('companyNameInput').value = '';
            document.getElementById('companyUrlInput').value = '';
        }

        function deleteCompany() {
            if (!currentCompanyId) return;
            if (!confirm('Are you sure you want to delete this company?')) return;

            companies = companies.filter(c => c.id !== currentCompanyId);
            saveToStorage();
            showCompanyList();
        }

        function updateCompanyStatus(id, applied, position) {
            const company = companies.find(c => c.id === id);
            if (company) {
                company.applied = applied;
                if (applied && position && !company.positions.includes(position)) {
                    company.positions.push(position);
                }
                saveToStorage();
                renderCompanies();
            }
        }

        function addPosition(id) {
            const company = companies.find(c => c.id === id);
            if (!company) return;

            const position = prompt('Enter position title:');
            if (position && position.trim()) {
                if (!company.positions.includes(position.trim())) {
                    company.positions.push(position.trim());
                    saveToStorage();
                    renderCompanies();
                }
            }
        }

        function removePosition(id, position) {
            const company = companies.find(c => c.id === id);
            if (company) {
                company.positions = company.positions.filter(p => p !== position);
                saveToStorage();
                renderCompanies();
            }
        }

        // Views
        function switchView(mode) {
            currentViewMode = mode;
            document.getElementById('listView').classList.remove('active');
            document.getElementById('gridView').style.display = 'none';
            document.getElementById('detailView').classList.remove('active');

            if (mode === 'list') {
                document.getElementById('listView').classList.add('active');
                renderTableView();
            } else if (mode === 'grid') {
                document.getElementById('gridView').style.display = 'flex';
                renderGridView();
            }
        }

        function showCompanyDetail(id) {
            currentCompanyId = id;
            const company = companies.find(c => c.id === id);
            if (!company) return;

            document.getElementById('listView').classList.remove('active');
            document.getElementById('gridView').style.display = 'none';
            document.getElementById('detailView').classList.add('active');

            document.getElementById('detailCompanyName').textContent = company.name;
            const link = document.getElementById('detailCompanyLink');
            link.href = company.url;
            link.textContent = company.url || 'No URL set';

            document.getElementById('lookingFor').value = company.notes.lookingFor;
            document.getElementById('recruiterInfo').value = company.notes.recruiterInfo;
            document.getElementById('peopleInfo').value = company.notes.peopleInfo;
            document.getElementById('personalNotes').value = company.notes.personalNotes;

            renderFilesList();
        }

        function showCompanyList() {
            currentCompanyId = null;
            switchView(currentViewMode);
        }

        function saveCompanyDetails() {
            const company = companies.find(c => c.id === currentCompanyId);
            if (!company) return;

            company.notes.lookingFor = document.getElementById('lookingFor').value;
            company.notes.recruiterInfo = document.getElementById('recruiterInfo').value;
            company.notes.peopleInfo = document.getElementById('peopleInfo').value;
            company.notes.personalNotes = document.getElementById('personalNotes').value;

            saveToStorage();
            alert('Notes saved!');
        }

        // Rendering
        function renderCompanies() {
            updateCompanyCount();
            renderSidebar();
            if (currentViewMode === 'list') {
                renderTableView();
            } else {
                renderGridView();
            }
        }

        function updateCompanyCount() {
            document.getElementById('companyCount').textContent = `${companies.length} ${companies.length === 1 ? 'company' : 'companies'}`;
        }

        function renderSidebar() {
            const list = document.getElementById('companiesList');
            list.innerHTML = companies.map(company => `
                <div class="company-item ${currentCompanyId === company.id ? 'active' : ''}"
                     onclick="showCompanyDetail('${company.id}')">
                    <div class="company-item-name">${company.name}</div>
                    <div class="company-item-status">
                        ${company.applied ? '✓ Applied' : 'Not applied'} ${company.positions.length > 0 ? `• ${company.positions.length} position(s)` : ''}
                    </div>
                </div>
            `).join('');
        }

        function renderTableView() {
            const table = document.getElementById('companiesTable');
            if (companies.length === 0) {
                table.innerHTML = '<p style="color: #86868b; text-align: center; margin-top: 40px;">No companies added yet</p>';
                return;
            }

            table.innerHTML = companies.map(company => `
                <div style="margin-bottom: 20px; padding: 16px; background: #262626; border-radius: 8px;">
                    <div style="margin-bottom: 12px;">
                        <div style="font-weight: 600; margin-bottom: 4px; cursor: pointer; color: #0071e3;" onclick="showCompanyDetail('${company.id}')">${company.name}</div>
                        ${company.url ? `<a href="${company.url}" target="_blank" style="color: #0071e3; font-size: 12px; text-decoration: none;">${company.url}</a>` : '<span style="color: #86868b; font-size: 12px;">No URL set</span>'}
                    </div>
                    <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 8px;">
                        <div class="checkbox-wrapper">
                            <input type="checkbox" class="checkbox" ${company.applied ? 'checked' : ''}
                                onchange="updateCompanyStatus('${company.id}', this.checked, '${company.positions[0] || ''}')">
                            <span style="font-size: 13px;">Applied</span>
                        </div>
                        <select class="positions-dropdown" onchange="updateCompanyStatus('${company.id}', true, this.value)">
                            <option value="">Select position...</option>
                            ${company.positions.map(pos => `<option value="${pos}">${pos}</option>`).join('')}
                            <option value="__new__">+ Add new position</option>
                        </select>
                    </div>
                    ${company.positions.length > 0 ? `
                        <div style="font-size: 12px; color: #86868b; margin-bottom: 8px;">
                            Positions: ${company.positions.map(pos => `<span style="display: inline-block; background: #323235; padding: 2px 6px; border-radius: 4px; margin-right: 4px;">${pos} <button style="background: none; border: none; color: #ff3b30; cursor: pointer; padding: 0; margin-left: 2px;" onclick="removePosition('${company.id}', '${pos}')">×</button></span>`).join('')}
                        </div>
                    ` : ''}
                    <button style="width: 100%; padding: 8px; background: #0071e3; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px;" onclick="showCompanyDetail('${company.id}')">View Details</button>
                </div>
            `).join('');
        }

        function renderGridView() {
            const grid = document.getElementById('companiesGrid');
            if (companies.length === 0) {
                grid.innerHTML = '<p style="color: #86868b; text-align: center;">No companies added yet</p>';
                return;
            }

            grid.innerHTML = companies.map(company => `
                <div class="company-card">
                    <div class="company-card-header">
                        <div class="company-card-name">${company.name}</div>
                        <button class="company-card-menu" onclick="showCompanyDetail('${company.id}')">→</button>
                    </div>
                    ${company.url ? `<a href="${company.url}" target="_blank" class="company-card-link">${company.url}</a>` : '<div style="color: #86868b; font-size: 12px; margin-bottom: 12px;">No URL set</div>'}
                    <div class="company-card-controls">
                        <div class="checkbox-wrapper">
                            <input type="checkbox" class="checkbox" ${company.applied ? 'checked' : ''}
                                onchange="updateCompanyStatus('${company.id}', this.checked)">
                            <span style="font-size: 12px;">Applied</span>
                        </div>
                    </div>
                    <select class="positions-dropdown" onchange="updateCompanyStatus('${company.id}', true, this.value); this.value = '';">
                        <option value="">Positions (${company.positions.length})</option>
                        ${company.positions.map(pos => `<option value="${pos}">${pos}</option>`).join('')}
                        <option value="__new__">+ Add position</option>
                    </select>
                </div>
            `).join('');
        }

        function renderFilesList() {
            const company = companies.find(c => c.id === currentCompanyId);
            const list = document.getElementById('filesList');

            if (!company || !company.notes.files || company.notes.files.length === 0) {
                list.innerHTML = '';
                return;
            }

            list.innerHTML = company.notes.files.map((file, index) => `
                <div class="file-item">
                    <span>${file.name}</span>
                    <div>
                        <button onclick="downloadFile(${index})">↓</button>
                        <button onclick="deleteFile(${index})">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function addFile() {
            const input = document.getElementById('fileInput');
            if (!input.files.length) return;

            const file = input.files[0];
            const reader = new FileReader();

            reader.onload = (e) => {
                const company = companies.find(c => c.id === currentCompanyId);
                if (!company) return;

                company.notes.files.push({
                    name: file.name,
                    data: e.target.result
                });

                saveToStorage();
                renderFilesList();
                input.value = '';
            };

            reader.readAsDataURL(file);
        }

        function deleteFile(index) {
            const company = companies.find(c => c.id === currentCompanyId);
            if (company) {
                company.notes.files.splice(index, 1);
                saveToStorage();
                renderFilesList();
            }
        }

        function downloadFile(index) {
            const company = companies.find(c => c.id === currentCompanyId);
            if (!company || !company.notes.files[index]) return;

            const file = company.notes.files[index];
            const link = document.createElement('a');
            link.href = file.data;
            link.download = file.name;
            link.click();
        }

        // Handle position dropdown change
        document.addEventListener('change', function(e) {
            if (e.target.classList.contains('positions-dropdown') && e.target.value === '__new__') {
                const id = e.target.parentElement.parentElement.getAttribute('data-company-id') ||
                          companies.find(c => Array.from(document.querySelectorAll('[data-company-id]')).some(el => el.getAttribute('data-company-id') === c.id))?.id;

                // Fallback to finding company from context
                const companies_items = document.querySelectorAll('[onclick*="updateCompanyStatus"]');
                for (let item of companies_items) {
                    if (item === e.target) {
                        const onclick = item.parentElement.parentElement.querySelector('[onclick*="showCompanyDetail"]')?.onclick.toString();
                        if (onclick) {
                            const match = onclick.match(/'([^']+)'/);
                            if (match) addPosition(match[1]);
                        }
                    }
                }
                e.target.value = '';
            }
        });

        // Init on load
        window.onload = init;
    </script>
</body>
</html>
